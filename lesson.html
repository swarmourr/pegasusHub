<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PegasusHub | Interactive Workspace</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Exact Theme Match with training.html */
        :root {
            --bg: #355872; --surface: rgba(30, 41, 59, 0.4); --border: rgba(148, 163, 184, 0.1);
            --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.2);
            --secondary: #9CD5FF; --secondary-glow: rgba(129, 140, 248, 0.2);
            --text-main: #f8fafc; --text-muted: #9CD5FF;
            --glass: rgba(2, 6, 23, 0.8);
            --grad: radial-gradient(circle at 50% -20%, rgba(129, 140, 248, 0.15) 0%, transparent 60%);
        }
        body.light-mode {
            --bg: #f8fafc; --surface: rgba(255, 255, 255, 0.7); --border: #e2e8f0;
            --primary: #0284c7; --text-main: #0f172a; --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --grad: radial-gradient(circle at 50% -20%, rgba(79, 70, 229, 0.08) 0%, transparent 60%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main);
            background-image: var(--grad); background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* Nav */
        nav {
            height: 80px; padding: 0 5%; background: var(--glass); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; justify-content: flex-start; }
        .nav-center { display: flex; align-items: center; justify-content: center; }
        .nav-right { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
        .nav-logo { font-weight: 800; font-size: 1.3rem; text-decoration: none; color: var(--text-main); letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .nav-logo i, .nav-logo span { color: var(--primary); }
        .nav-links { display: flex; align-items: center; list-style: none; margin: 0; padding: 0; }
        .nav-item { display: flex; align-items: center; position: relative; }
        .nav-item:not(:last-child)::after { content: ''; width: 25px; height: 2px; background: var(--border); margin: 0 10px; transition: 0.3s; }
        .nav-item:hover:not(:last-child)::after, .nav-item.active-path:not(:last-child)::after { background: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .nav-link { display: flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-link i { background: var(--surface); border: 1px solid var(--border); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); transition: 0.3s; font-size: 0.85rem; }
        .nav-link:hover { color: var(--text-main); }
        .nav-link:hover i, .nav-link.active i { background: var(--primary-glow); border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px var(--primary-glow); color: var(--text-main); }
        .nav-link.active { color: var(--text-main); }
        .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); width: 42px; height: 42px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { color: var(--primary); border-color: var(--primary); }
        @media (max-width: 1000px) {
            nav { grid-template-columns: 1fr; gap: 15px; justify-items: center; height: auto; padding: 20px 5%; }
            .nav-left, .nav-center, .nav-right { justify-content: center; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .nav-item:not(:last-child)::after { display: none; }
        }

        /* Main Workspace Area */
        .workspace { flex-grow: 1; padding: 40px 5%; display: flex; flex-direction: column; max-width: 1600px; margin: 0 auto; width: 100%; }
        
        /* IDE-Style Container */
        .ide-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            overflow: hidden; backdrop-filter: blur(12px);
            height: calc(100vh - 160px); /* Responsive height */
        }

        /* IDE Toolbar */
        .ide-toolbar {
            padding: 15px 25px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2);
        }
        body.light-mode .ide-toolbar { background: rgba(255,255,255,0.5); }
        
        .ide-title-group { display: flex; flex-direction: column; }
        .ide-title { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .ide-subtitle { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

        .ide-actions { display: flex; gap: 12px; }
        .action-btn {
            background: var(--surface); color: var(--text-main); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .action-btn:hover { background: var(--primary); border-color: var(--primary); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }

        /* Iframe & Loading Area */
        .iframe-wrapper { flex-grow: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; opacity: 0; transition: opacity 0.5s ease; }
        iframe.loaded { opacity: 1; }

        /* Sleek CSS Loader */
        .loader-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg); z-index: 5;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid var(--surface);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="nav-logo"><i class="fas fa-layer-group"></i> PEGASUS<span>HUB</span></a>
        </div>
        <div class="nav-center">
            <ul class="nav-links">
                <li class="nav-item active-path">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-info-circle"></i> About
                    </a>
                </li>
                <li class="nav-item active-path">
                    <a href="training.html" class="nav-link active">
                        <i class="fas fa-graduation-cap"></i> Academy
                    </a>
                </li>
                <li class="nav-item active-path">
                    <a href="registry.html" class="nav-link">
                        <i class="fas fa-book-atlas"></i> Examples
                    </a>
                </li>
                <li class="nav-item">
                    <a href="deployment.html" class="nav-link">
                        <i class="fas fa-rocket"></i> Build & Run
                    </a>
                </li>
                <li class="nav-item">
                    <a href="deployment.html#contribute" class="nav-link">
                        <i class="fas fa-code-pull-request"></i> Contribute
                    </a>
                </li>
            </ul>
        </div>
        <div class="nav-right">
            <a href="https://github.com/pegasus-isi" target="_blank" style="color: var(--text-muted); font-size: 1.2rem; transition: 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'"><i class="fab fa-github"></i></a>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="workspace">
        <div class="ide-container" id="ide-container">
            
            <div class="ide-toolbar">
                <div class="ide-title-group">
                    <span class="ide-title" id="page-title">Initializing Workspace...</span>
                    <span class="ide-subtitle">Interactive Jupyter Environment</span>
                </div>
                <div class="ide-actions">
                    <a href="training.html" class="action-btn" title="Back to Academy">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                    <a href="#" id="download-btn" target="_blank" class="action-btn" title="Download .ipynb">
                        <i class="fas fa-download"></i> Download
                    </a>
                    <a href="#" id="repo-link" target="_blank" class="action-btn" title="View Source on GitHub">
                        <i class="fab fa-github"></i> Source
                    </a>
                    <button class="action-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>

            <div class="iframe-wrapper">
                <div class="loader-container" id="loader">
                    <div class="spinner"></div>
                    <div class="loader-text">CONNECTING TO JUPYTER RENDERER...</div>
                </div>
                <iframe id="notebook-frame" src="" title="Notebook Viewer" allowfullscreen></iframe>
            </div>

        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.querySelector('.theme-toggle i');
            const mode = document.body.classList.contains('light-mode') ? 'light' : 'dark';
            localStorage.setItem('theme', mode);
            icon.className = mode === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); document.querySelector('.theme-toggle i').className = 'fas fa-sun'; }

        // Grab parameters from the URL
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title');
        const notebookPath = params.get('notebook'); // e.g., pegasus-isi/ACCESS-Pegasus-Examples/blob/main/...

        if (title && notebookPath) {
            // Set Titles and Links
            document.getElementById('page-title').innerText = title;
            document.getElementById('repo-link').href = "https://github.com/" + notebookPath;
            
            // Generate Raw Download Link (Converts /blob/ to /raw/)
            const rawPath = notebookPath.replace('/blob/', '/raw/');
            document.getElementById('download-btn').href = "https://github.com/" + rawPath;

            // Generate the NBViewer URL
            const viewerUrl = "https://nbviewer.jupyter.org/github/" + notebookPath;
            const iframe = document.getElementById('notebook-frame');
            
            // Set the iframe source
            iframe.src = viewerUrl;

            // Hide the loader and fade in the iframe once it finishes loading
            iframe.onload = function() {
                document.getElementById('loader').style.display = 'none';
                iframe.classList.add('loaded');
            };

        } else {
            // Error Handling if parameters are missing
            document.getElementById('page-title').innerText = "404: Notebook Not Found";
            document.getElementById('loader').innerHTML = `
                <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f43f5e; margin-bottom: 20px;"></i>
                <div style="color: var(--text-main); font-size: 1.2rem; margin-bottom: 10px;">Invalid or missing URL parameters.</div>
                <a href="training.html" class="action-btn" style="width: fit-content; margin-top: 15px;">Return to Academy</a>
            `;
        }

        // Fullscreen Toggle Logic
        function toggleFullscreen() {
            const ide = document.getElementById('ide-container');
            if (!document.fullscreenElement) {
                if (ide.requestFullscreen) ide.requestFullscreen();
                else if (ide.webkitRequestFullscreen) ide.webkitRequestFullscreen(); // Safari
                else if (ide.msRequestFullscreen) ide.msRequestFullscreen(); // IE11
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); // Safari
                else if (document.msExitFullscreen) document.msExitFullscreen(); // IE11
            }
        }
    </script>
</body>
</html>
