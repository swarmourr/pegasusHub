# Welcome to Pegasus WMS
## The Big Picture

Welcome to the masterclass! To truly understand the **Pegasus Workflow Management System (WMS)**, you first need to understand the massive problem it solves for scientists, engineers, and data analysts.

Imagine you are an astronomer. You have 10,000 high-resolution images of galaxies, and you need to run a complex Python machine-learning script to analyze each one. Doing this sequentially on your laptop would take 5 years. You need to run this on a massive supercomputer or an AWS cloud cluster.

But doing that manually is a nightmare:
1. How do you reliably move 10,000 files to a remote supercomputer?
2. How do you ensure your specific Python libraries are installed there?
3. What if Server #443 crashes halfway through? How do you restart just that one job without starting over?

**Pegasus WMS is the automated manager that handles all of this for you.**

### The Abstraction Principle
Pegasus is built entirely on the philosophy of **Separation of Concerns**. 

When you write a Pegasus workflow, you do *not* write physical, machine-specific instructions like:
> *"Download image.jpg from AWS S3, log into Server 4, run Python 3.9 located at /usr/bin/python, and save to /tmp/results."*

If Server 4 is offline, your workflow breaks. Instead, Pegasus forces you to write **Abstract Workflows**. You simply declare your intentions:
> *"I have a conceptual file called `image.jpg`. I want to run a conceptual program called `analyze`. Please produce `result.txt`."*

It is Pegasus's job to look at that abstract request, consult its catalogs, figure out where the data is, move it to the right server, run the job, and bring the results back securely.

<div class="info-box">
    <i class="fas fa-lightbulb"></i>
    <strong>Portability:</strong> Because your workflow is abstract, you can run the exact same Pegasus Python script on your local laptop on Monday, and deploy it to a 10,000-node cluster on Tuesday, without changing a single line of your workflow code!
</div>

To make this magic happen, Pegasus relies on **Three Catalogs** and **One Blueprint**.
1. **The Replica Catalog**: Where is my data?
2. **The Transformation Catalog**: Where is my software?
3. **The Site Catalog**: Where is my hardware?
4. **The Workflow (DAG)**: What is the exact order of operations?

# The Replica Catalog
## Where is my Data?

In Pegasus, data files have a split personality. To achieve true portability, files are divided into a **Logical File Name (LFN)** and a **Physical File Name (PFN)**.

### LFN vs PFN
* **LFN (Logical)**: This is simply the name of the file as your workflow thinks of it. (e.g., `input_data.csv`).
* **PFN (Physical)**: This is the actual, exact URL or file path where the file currently exists in the real physical world. (e.g., `s3://my-bucket/dataset/input_data.csv` or `file:///home/user/data/input_data.csv`).

### Why do we split them?
Imagine you hardcode `/home/user/data.csv` into your Python processing scripts. What happens if you share your workflow with a colleague at another university? It crashes instantly, because they do not have a `/home/user` directory on their computer. 

By using the **Replica Catalog**, your workflow scripts only ever ask for `data.csv` in the current working directory. Pegasus will look inside the Replica Catalog, find the physical location, and automatically execute a secure file transfer to pull the file to the execution server *before* your job starts!

### How to write it in Python

```python
from Pegasus.api import *

# 1. Create the Logical File representation
my_input = File("raw_data.csv")

# 2. Initialize an empty Replica Catalog
rc = ReplicaCatalog()

# 3. Tell the catalog where the file actually lives physically
# Format: add_replica(site_name, logical_file, physical_path)
rc.add_replica("local", my_input, "file:///home/ubuntu/project/raw_data.csv")

# You can even add backups! If the local file is missing, pull from HTTP!
rc.add_replica("isi_server", my_input, "[http://pegasus.isi.edu/data/raw_data.csv](http://pegasus.isi.edu/data/raw_data.csv)")

# 4. Attach the catalog to your workflow
wf.add_replica_catalog(rc)
```

<div class="info-box">
    <i class="fas fa-exclamation-triangle"></i>
    <strong>Important:</strong> You only put files in the Replica Catalog if they exist <em>before</em> the workflow runs (Input Files). Intermediate files (generated during the workflow) do not go here! Pegasus tracks intermediate files automatically.
</div>

# Transformations
## Where is my Software?

Just like data files, the actual software programs (Python scripts, C++ executables, compiled binaries) you want to run are abstracted in Pegasus. We call software executables **Transformations**.

### The Transformation Catalog
The Transformation Catalog (TC) maps a logical software name to its physical executable location or container. 

If your workflow needs to run a Python script to clean data, you do not tell the workflow to run `/home/user/scripts/clean.py`. You tell it to run a logical transformation called `clean_data`. The TC holds the physical address.

### Stageable vs Installed Executables
When defining a transformation, you must tell Pegasus how to access it:
* **Installed:** The software is already pre-installed on the execution server (like `grep` or `/usr/bin/python3`). Pegasus just calls it.
* **Stageable:** The software is a custom script sitting on your laptop. Pegasus must physically transfer (stage) the script to the remote compute node before it can execute!

### How to write it in Python

```python
from Pegasus.api import *

tc = TransformationCatalog()

# Define a transformation. 
# is_stageable=True means Pegasus will physically copy this Python script 
# to the execution server before trying to run it!
preprocess_script = Transformation(
    name="clean_data",
    site="local",
    pfn="/home/ubuntu/project/bin/clean.py",
    is_stageable=True,
    arch=Arch.X86_64,    # Optional: specify required architecture
    os_type=OS.LINUX     # Optional: specify required OS
)

# Add it to the catalog
tc.add_transformations(preprocess_script)
wf.add_transformation_catalog(tc)
```

<div class="info-box">

</div>

# The Site Catalog
## Where is my Hardware?

A **Site** in Pegasus is a location where jobs can be executed, or where data can be stored securely. 

In most beginner workflows, you only use one site: `"local"`. This just means "the computer I am currently typing on." 

However, in advanced grid computing, you might string together multiple sites simultaneously:
* `"local"`: Your laptop (used for planning the workflow).
* `"condorpool"`: A massive cluster of 1,000 servers managed by HTCondor for heavy execution.
* `"aws_s3"`: An Amazon storage bucket where final results should be pushed for safekeeping.

### Scratch vs Storage Directories
When defining a site in the Site Catalog, you must explicitly tell Pegasus about two specific directories. Pegasus uses these to orchestrate data movement safely.

1. **Scratch Directory**: This is a temporary, high-speed workspace. When Pegasus runs jobs, it moves the data here, runs the code, generates intermediate temporary files, and does its messy work. When the workflow finishes, this directory can be wiped clean to save space.
2. **Storage Directory**: This is the safe zone. When your workflow generates a "final" output file that you actually want to keep, Pegasus will move it out of the chaotic scratch directory and place it securely into the Storage directory.

### How to write it in Python
If you are running everything locally, Pegasus is actually smart enough to generate a basic local Site Catalog automatically for you, so you rarely need to write this code manually! 

But if you were connecting to a remote cluster, it looks like this:

```python
from Pegasus.api import *

sc = SiteCatalog()

# Define the local site
local_site = Site("local")

# Define where the temporary workspace is
scratch_dir = Directory(Directory.SHARED_SCRATCH, path="/tmp/pegasus-scratch")
scratch_dir.add_file_servers(FileServer("file:///tmp/pegasus-scratch", Operation.ALL))
local_site.add_directories(scratch_dir)

# Define where final outputs go
storage_dir = Directory(Directory.LOCAL_STORAGE, path="/home/ubuntu/outputs")
storage_dir.add_file_servers(FileServer("file:///home/ubuntu/outputs", Operation.ALL))
local_site.add_directories(storage_dir)

sc.add_sites(local_site)
wf.add_site_catalog(sc)

# Building the DAG
## The Complete Diamond Workflow



We have defined our Data (Replica Catalog). We have defined our Software (Transformation Catalog). We have defined our Hardware (Site Catalog). 

Now, we build the actual **Blueprint**. In Pegasus, workflows are modeled mathematically as **Directed Acyclic Graphs (DAGs)**.
* **Directed**: Data flows strictly in one direction (Input -> Process -> Output).
* **Acyclic**: There are no infinite loops allowed. You cannot send an output file backwards to a previous step.

Here is the fully complete **Diamond Workflow**. It takes a file, splits it into two, processes both halves in parallel simultaneously, and then safely merges them back together at the bottom!

### Connecting the Dots
To build the DAG, you create `Job` objects. You assign a Transformation to the Job, and then you explicitly define what `File` objects go *into* the job, and what `File` objects come *out* of the job.

**Pegasus figures out the shape of the graph automatically based on those files!** Because `Analyze` requires `f.c1` and `f.c2`, Pegasus knows it *must* wait for both `Findrange` jobs to finish. 

### How to write it in Python

```python
from Pegasus.api import *

wf = Workflow("diamond-workflow")

# Define Logical Files
f_a = File("f.a")
f_b1 = File("f.b1")
f_b2 = File("f.b2")
f_c1 = File("f.c1")
f_c2 = File("f.c2")
f_d = File("f.d")

# TOP JOB: Preprocess
job_preprocess = Job("preprocess")
job_preprocess.add_inputs(f_a)
job_preprocess.add_outputs(f_b1, f_b2) # Spits out two files!

# MIDDLE JOBS: Findrange (Parallel!)
job_findrange_1 = Job("findrange")
job_findrange_1.add_inputs(f_b1)
job_findrange_1.add_outputs(f_c1)

job_findrange_2 = Job("findrange")
job_findrange_2.add_inputs(f_b2)
job_findrange_2.add_outputs(f_c2)

# BOTTOM JOB: Analyze (Merge)
job_analyze = Job("analyze")
job_analyze.add_inputs(f_c1, f_c2) # Waits for both!
job_analyze.add_outputs(f_d)

# Add all jobs to workflow
wf.add_jobs(job_preprocess, job_findrange_1, job_findrange_2, job_analyze)

# Plan and Run!
wf.plan(submit=True)
```
