# 💎 The Diamond Workflow
## A Complete Beginner's Guide to Parallel Computing

Welcome to your first step into high-performance computing! If you are learning the **Pegasus Workflow Management System (WMS)**, the Diamond Workflow is the absolute best place to start. 

Normally, when we write standard computer programs, tasks execute sequentially (Step 1, then Step 2, then Step 3). But in scientific computing, machine learning, and data processing, waiting for tasks one-by-one takes too long. 

If two tasks do not rely on each other's data, **we should run them at the exact same time**. This is called parallel computing.

The Diamond Workflow perfectly demonstrates this concept. It gets its name from its shape:
1. **The Top (`preprocess`):** A single job takes a starting file and splits the data into two independent pieces.
2. **The Middle (`findrange`):** Two independent jobs run simultaneously. Each processes one half of the data.
3. **The Bottom (`analyze`):** A final job waits for the two middle jobs to finish, then merges their results.

Let's build this entire workflow from scratch!

---

## Step 1: Create Your Executable Programs

Before Pegasus can manage your workflow, it needs the actual software programs that will do the math or process the data. We will write three simple Python scripts to act as our "software."

Open your terminal and create a folder for your project:

```bash
mkdir pegasus-beginner
cd pegasus-beginner
mkdir bin
```

### 1A. The Top Node: `preprocess`
Create a file named `bin/preprocess` and paste this code. It reads an input file and splits it into two outputs.

```python
#!/usr/bin/env python3
import sys

# sys.argv reads the arguments passed by Pegasus
input_file = sys.argv[1]
output_1 = sys.argv[2]
output_2 = sys.argv[3]

# Read the starting data
with open(input_file, 'r') as f: 
    data = f.read()

# Write data to two parallel branches
with open(output_1, 'w') as f1: 
    f1.write(f"{data} -> Processed for Branch 1")

with open(output_2, 'w') as f2: 
    f2.write(f"{data} -> Processed for Branch 2")
```

### 1B. The Middle Nodes: `findrange`
Create a file named `bin/findrange`. This exact script will be executed twice simultaneously by Pegasus.

```python
#!/usr/bin/env python3
import sys

input_file = sys.argv[1]
output_file = sys.argv[2]

with open(input_file, 'r') as f: 
    data = f.read()

with open(output_file, 'w') as f: 
    f.write(f"{data} -> Analyzed by Findrange")
```

### 1C. The Bottom Node: `analyze`
Create a file named `bin/analyze`. This script merges the two branches back together.

```python
#!/usr/bin/env python3
import sys

# Read the data from both middle jobs
with open(sys.argv[1], 'r') as f1: data1 = f1.read()
with open(sys.argv[2], 'r') as f2: data2 = f2.read()

# Merge it into the final output file
with open(sys.argv[3], 'w') as out:
    out.write("--- FINAL MERGED RESULT ---\n")
    out.write(f"Result A: {data1}\n")
    out.write(f"Result B: {data2}\n")
```

**Crucial Step:** Your computer needs permission to execute these files! Run this in your terminal:

```bash
chmod +x bin/preprocess bin/findrange bin/analyze
```

---

## Step 2: Write the Workflow Blueprint

Now we need to tell Pegasus how these scripts connect to each other. We do this by writing a "Blueprint" using the Pegasus Python API. 

Create a file named `workflow_generator.py` in your main `pegasus-beginner` folder.

```python
#!/usr/bin/env python3
import logging
from pathlib import Path
from Pegasus.api import *

# Show helpful messages in the console
logging.basicConfig(level=logging.DEBUG)

# 1. Initialize the Workflow
wf = Workflow("diamond-beginner")

# 2. Create the Starting File (f.a)
with open("f.a", "w") as f: 
    f.write("Starting Point")
    
in_file = File("f.a")
rc = ReplicaCatalog().add_replica("local", in_file, Path(".").resolve() / "f.a")
wf.add_replica_catalog(rc)

# 3. Define the Executables (Tell Pegasus where our 'bin' tools are)
preprocess = Transformation("preprocess", site="local", pfn=Path(".").resolve() / "bin/preprocess", is_stageable=True)
findrange = Transformation("findrange", site="local", pfn=Path(".").resolve() / "bin/findrange", is_stageable=True)
analyze = Transformation("analyze", site="local", pfn=Path(".").resolve() / "bin/analyze", is_stageable=True)

tc = TransformationCatalog().add_transformations(preprocess, findrange, analyze)
wf.add_transformation_catalog(tc)

# 4. Connect the Jobs (Build the Diamond shape)
f_b1 = File("f.b1")
f_b2 = File("f.b2")
job_preprocess = Job(preprocess).add_args(in_file, f_b1, f_b2).add_inputs(in_file).add_outputs(f_b1, f_b2)

f_c1 = File("f.c1")
f_c2 = File("f.c2")
# Notice how findrange is used twice!
job_findrange_1 = Job(findrange).add_args(f_b1, f_c1).add_inputs(f_b1).add_outputs(f_c1)
job_findrange_2 = Job(findrange).add_args(f_b2, f_c2).add_inputs(f_b2).add_outputs(f_c2)

f_d = File("f.d")
job_analyze = Job(analyze).add_args(f_c1, f_c2, f_d).add_inputs(f_c1, f_c2).add_outputs(f_d)

# Add them all to the workflow
wf.add_jobs(job_preprocess, job_findrange_1, job_findrange_2, job_analyze)

# 5. Plan and Submit to the computer!
try:
    wf.plan(submit=True)
except PegasusClientError as e:
    print(e)
```

---

## Step 3: Run and Monitor!

You are ready! Execute your blueprint script:

```bash
chmod +x workflow_generator.py
./workflow_generator.py
```

Pegasus will plan the execution, handle the data transfers, and run the jobs. It will output a "submit directory path" in your terminal. You can check the progress of your parallel jobs by running:

```bash
pegasus-status [paste_your_submit_directory_path_here]
```

When it finishes, look inside your folder for a new file named `f.d`. Open it up, and you will see your merged data! You have officially run your first parallel workflow.

<script>
    const md = window.markdownit({ html: true });

    async function init() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
        }

        try {
            const rawContent = document.getElementById('source-md').textContent;
            const parts = rawContent.split('---');
            if (parts.length < 3) throw new Error("Invalid Markdown Structure.");
            
            const yaml = parts[1];
            let body = parts.slice(2).join('---');

            const meta = {};
            yaml.trim().split('\n').forEach(line => {
                const [key, ...val] = line.split(':');
                if(key && val.length > 0) meta[key.trim().toLowerCase()] = val.join(':').trim().replace(/['"]/g, '');
            });

            document.getElementById('m-ver').innerText = meta.pegasus_version || 'N/A';
            document.getElementById('m-date').innerText = meta.last_verified || 'N/A';
            
            if (meta.github_repo) {
                document.getElementById('gh-link').href = meta.github_repo;
                if (meta.github_repo.includes('github.com')) {
                    const urlParts = new URL(meta.github_repo).pathname.split('/').filter(x => x);
                    if(urlParts.length >= 2) fetchGitHubData(urlParts[0], urlParts[1]);
                }
            }

            const codeRegex = /```svg[\s\S]*?\n([\s\S]*?)```/g;
            let match;
            while ((match = codeRegex.exec(body)) !== null) {
                if (match[1].includes('<svg')) {
                    renderVizTerminal(match[1]); 
                    body = body.replace(match[0], ''); 
                    break;
                }
            }

            document.getElementById('wf-content').innerHTML = md.render(body);

        } catch (error) {
            document.getElementById('wf-content').innerHTML = `<h2>Error Loading Content</h2><p>${error.message}</p>`;
        }
    }

    function renderVizTerminal(svgData) {
        const vizBox = document.getElementById('viz-box');
        const vizTarget = document.getElementById('viz-target');
        
        vizBox.style.display = 'block'; 
        vizTarget.innerHTML = svgData;

        const svgElement = vizTarget.querySelector('svg');
        if(svgElement) {
            svgElement.setAttribute('width', '100%');
            svgElement.setAttribute('height', '100%');
            
            vizTarget.querySelectorAll('.edge path').forEach(path => {
                const bulletPath = path.cloneNode(true);
                bulletPath.classList.add('bullet');
                bulletPath.removeAttribute('id');
                path.parentNode.appendChild(bulletPath);
            });
        }
    }

    async function fetchGitHubData(owner, repo) {
        try {
            const r1 = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents`);
            if (!r1.ok) throw new Error();
            const files = await r1.json();
            
            document.getElementById('tree-box').innerHTML = files.slice(0,6).map(f => 
                `<div class="tree-node"><i class="fas ${f.type==='dir'?'fa-folder':'fa-file-code'}"></i> ${f.name}</div>`
            ).join('');

            const r2 = await fetch(`https://api.github.com/repos/${owner}/${repo}/contributors?per_page=5`);
            if (!r2.ok) throw new Error();
            const users = await r2.json();
            
            document.getElementById('contrib-stack').innerHTML = users.map(u => 
                `<img src="${u.avatar_url}" title="${u.login}" alt="${u.login}">`
            ).join('');
            
        } catch(error) { 
            document.getElementById('tree-box').innerHTML = "<span style='color:var(--text-muted);font-size:0.8rem;'>Unavailable.</span>";
            document.getElementById('contrib-stack').innerHTML = "<span style='color:var(--text-muted);font-size:0.8rem;'>Unavailable.</span>";
        }
    }

    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('.theme-toggle i');
        body.classList.toggle('light-mode');
        if(body.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            localStorage.setItem('theme', 'dark');
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    }

    window.onload = init;
</script>
