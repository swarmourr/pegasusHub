<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PegasusHub | Page Not Found</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --border: rgba(148,163,184,0.1);
            --primary: #22d3ee; --primary-glow: rgba(34,211,238,0.15);
            --text-main: #f8fafc; --text-muted: #94a3b8; --text-dim: #475569;
            --glass: rgba(15,23,42,0.92);
            --indigo: #818cf8;
        }
        body.light-mode {
            --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
            --primary: #0284c7; --primary-glow: rgba(2,132,199,0.1);
            --text-main: #0f172a; --text-muted: #475569; --text-dim: #94a3b8;
            --glass: rgba(255,255,255,0.95);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text-main);
            min-height:100vh; display:flex; flex-direction:column;
            animation: pageFadeIn 0.5s ease forwards;
        }
        @keyframes pageFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* Nav */
        nav {
            height:64px; padding:0 6%; background:var(--glass); backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border); display:flex; justify-content:space-between;
            align-items:center; position:sticky; top:0; z-index:100;
        }
        .nav-logo { font-weight:800; font-size:1.25rem; text-decoration:none; color:var(--text-main); letter-spacing:-1px; display:flex; align-items:center; gap:8px; }
        .nav-logo i { color:var(--primary); }
        .nav-logo span { color:var(--primary); }
        .theme-toggle { background:transparent; border:1px solid var(--border); color:var(--text-muted); width:34px; height:34px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .theme-toggle:hover { color:var(--primary); border-color:var(--primary); }

        /* Main */
        main {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:60px 24px; text-align:center;
        }

        .error-wrap { max-width:540px; }

        .error-code {
            font-size:8rem; font-weight:800; line-height:1; letter-spacing:-8px;
            background:linear-gradient(135deg, var(--text-main) 20%, var(--primary) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            margin-bottom:8px; font-family:'JetBrains Mono',monospace;
        }

        .error-glow {
            width:200px; height:200px; border-radius:50%;
            background:radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 70%);
            position:absolute; top:50%; left:50%; transform:translate(-50%,-60%);
            pointer-events:none; z-index:0;
        }

        .error-icon {
            font-size:3.5rem; color:var(--primary); margin-bottom:24px;
            filter:drop-shadow(0 0 20px var(--primary-glow));
            animation:float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        .error-title { font-size:1.6rem; font-weight:800; letter-spacing:-1px; margin-bottom:12px; }
        .error-desc { font-size:1rem; color:var(--text-muted); line-height:1.7; margin-bottom:36px; }

        .error-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

        .btn-primary {
            display:inline-flex; align-items:center; gap:8px;
            background:var(--primary); color:#000; padding:12px 24px;
            border-radius:10px; font-weight:800; text-decoration:none; font-size:0.85rem;
            transition:opacity 0.2s;
        }
        .btn-primary:hover { opacity:0.85; }

        .btn-secondary {
            display:inline-flex; align-items:center; gap:8px;
            background:transparent; color:var(--text-muted); padding:12px 24px;
            border-radius:10px; font-weight:700; text-decoration:none; font-size:0.85rem;
            border:1px solid var(--border); transition:all 0.2s;
        }
        .btn-secondary:hover { color:var(--primary); border-color:var(--primary); background:var(--primary-glow); }

        .error-links {
            margin-top:48px; padding-top:32px; border-top:1px solid var(--border);
            display:flex; gap:24px; justify-content:center; flex-wrap:wrap;
        }
        .error-link {
            display:flex; align-items:center; gap:8px; color:var(--text-dim);
            text-decoration:none; font-size:0.82rem; font-weight:700;
            transition:color 0.2s;
        }
        .error-link i { color:var(--primary); font-size:0.8rem; }
        .error-link:hover { color:var(--primary); }

        /* Footer */
        footer { padding:24px 6%; text-align:center; border-top:1px solid var(--border); font-size:0.8rem; color:var(--text-dim); }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">
        <i class="fas fa-layer-group"></i>PEGASUS<span>HUB</span>
    </a>
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
</nav>

<main>
    <div class="error-wrap">
        <div class="error-code">404</div>

        <div class="error-icon">
            <i class="fas fa-satellite-dish"></i>
        </div>

        <h1 class="error-title">Page not found</h1>
        <p class="error-desc">
            The workflow or page you're looking for doesn't exist, was moved, or is temporarily offline.
        </p>

        <div class="error-actions">
            <a href="index.html" class="btn-primary"><i class="fas fa-house"></i> Go Home</a>
            <a href="registry.html" class="btn-secondary"><i class="fas fa-book-atlas"></i> Browse Workflows</a>
        </div>

        <div class="error-links">
            <a href="training.html" class="error-link"><i class="fas fa-graduation-cap"></i> Academy</a>
            <a href="deployment.html" class="error-link"><i class="fas fa-rocket"></i> Build & Run</a>
            <a href="https://pegasus.isi.edu" target="_blank" class="error-link"><i class="fas fa-external-link-alt"></i> Pegasus WMS</a>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 PegasusHub · pegasus-wms team · ISI-USC
</footer>

<script>
    (function() {
        const saved = localStorage.getItem('theme');
        if (saved !== 'dark') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
        }
    })();

    function toggleTheme() {
        const b = document.body;
        const i = document.querySelector('.theme-toggle i');
        b.classList.toggle('light-mode');
        if (b.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            i.classList.replace('fa-moon', 'fa-sun');
        } else {
            localStorage.setItem('theme', 'dark');
            i.classList.replace('fa-sun', 'fa-moon');
        }
    }
</script>
</body>
</html>
