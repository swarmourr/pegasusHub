<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pegasus Beginner Training | Split Workflow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>

    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --border: rgba(148, 163, 184, 0.1);
            --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.6);
            --text-main: #f8fafc; --text-muted: #94a3b8; --glass: rgba(15, 23, 42, 0.9);
        }
        body.light-mode {
            --bg: #f8fafc; --surface: #ffffff; --border: #cbd5e1;
            --primary: #0284c7; --primary-glow: rgba(2, 132, 199, 0.4);
            --text-main: #0f172a; --text-muted: #475569; --glass: rgba(255, 255, 255, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; line-height: 1.7; font-size: 1.05rem; }
        nav { height: 75px; padding: 0 8%; background: var(--glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-logo { font-weight: 800; font-size: 1.3rem; text-decoration: none; color: var(--text-main); letter-spacing: -1px; }
        .nav-logo span { color: var(--primary); }
        .theme-toggle { background: transparent; border: 1px solid var(--border); color: var(--text-muted); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        
        .container { max-width: 1400px; margin: 60px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 350px; gap: 60px; }
        main { min-width: 0; }
        
        #wf-content h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 10px; line-height: 1.1; }
        #wf-content h2 { font-size: 1.4rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin: 50px 0 20px; border-left: 4px solid var(--primary); padding-left: 15px; }
        #wf-content h3 { font-size: 1.2rem; margin: 30px 0 15px; color: var(--text-main); font-weight: 600; }
        #wf-content p { margin-bottom: 20px; color: var(--text-muted); }
        #wf-content strong { color: var(--text-main); font-weight: 600; }
        #wf-content hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
        
        pre { background: #0f172a; border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin: 25px 0; overflow-x: auto; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        pre code { color: #cbd5e1; }
        :not(pre) > code { background: var(--surface); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--primary); }
        
        #wf-content ul, #wf-content ol { margin-left: 20px; margin-bottom: 20px; color: var(--text-muted); }
        #wf-content li { margin-bottom: 10px; }

        .viz-terminal { background: #000; border: 1px solid var(--border); border-radius: 16px; margin: 40px 0; overflow: hidden; box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5); }
        .term-header { background: #0f172a; padding: 12px 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .dot-group { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        #viz-target { padding: 40px; display: flex; justify-content: center; align-items: center; background: #050a15; min-height: 300px; }
        #viz-target svg { width: 100%; height: 100%; max-height: 400px; max-width: 700px; }
        #viz-target img { max-width: 100%; height: auto; max-height: 500px; border-radius: 8px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .edge path { stroke: #1e293b !important; stroke-width: 2px !important; opacity: 0.5; fill: none !important; }
        .bullet { fill: none !important; stroke: #22d3ee !important; stroke-width: 4px !important; stroke-linecap: round; stroke-dasharray: 1, 100; animation: flow 3s linear infinite; filter: drop-shadow(0 0 8px #22d3ee); visibility: visible !important; pointer-events: none; }
        @keyframes flow { 0% { stroke-dashoffset: 200; } 100% { stroke-dashoffset: 0; } }

        aside { position: sticky; top: 100px; align-self: start; }
        .sidebar-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 20px; margin-bottom: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .sidebar-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }
        .btn-primary { display: block; width: 100%; padding: 14px; background: var(--primary); color: #000; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 800; font-size: 0.9rem; transition: transform 0.2s, background 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); background: #67e8f9; }
        .tree-node { font-family: 'JetBrains Mono'; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .tree-node i { color: var(--primary); }
        .avatar-stack { display: flex; padding-left: 10px; }
        .avatar-stack img { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--surface); margin-left: -10px; transition: transform 0.2s; cursor: pointer; }
        .avatar-stack img:hover { transform: translateY(-5px); z-index: 10; }
        .meta-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } aside { position: static; } }
    </style>
</head>
<body>

<nav>
    <a href="#" class="nav-logo">PEGASUS<span>TRAINING</span></a>
    <div style="display:flex; gap:20px; align-items:center;">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode"><i class="fas fa-moon"></i></button>
    </div>
</nav>

<div class="container">
    <main>
        <article id="wf-content">Loading Course Protocol...</article>
        
        <div class="viz-terminal" id="viz-box" style="display:none;">
            <div class="term-header">
                <div class="dot-group">
                    <div class="dot" style="background:#ef4444"></div>
                    <div class="dot" style="background:#eab308"></div>
                    <div class="dot" style="background:#22c55e"></div>
                </div>
                <div id="viz-title" style="font-size:0.7rem; color:#64748b; font-family:'JetBrains Mono'">live_dag_visualization</div>
            </div>
            <div id="viz-target"></div>
        </div>
    </main>

    <aside>
        <div class="sidebar-card">
            <span class="sidebar-label">Source Repository</span>
            <div id="tree-box" style="margin-bottom:20px;">Loading files...</div>
            <a href="#" id="gh-link" target="_blank" class="btn-primary">VIEW ON GITHUB</a>
        </div>
        <div class="sidebar-card">
            <span class="sidebar-label">Top Contributors</span>
            <div class="avatar-stack" id="contrib-stack">Loading...</div>
        </div>
        <div class="sidebar-card">
            <span class="sidebar-label">Environment Requirements</span>
            <div class="meta-row">
                <span style="color:var(--text-muted)">Pegasus WMS</span>
                <strong id="m-ver" style="color:var(--primary)">--</strong>
            </div>
            <div class="meta-row" style="margin-bottom:0;">
                <span style="color:var(--text-muted)">Last Updated</span>
                <strong id="m-date">--</strong>
            </div>
        </div>
    </aside>
</div>

<script type="text/markdown" id="source-md">
---
github_owner: "pegasus-isi"
github_repo: "https://github.com/pegasus-isi/split-workflow"
title: "split-workflow"
subtitle: "Split workflow example"
pegasus_version: ">= 5.0.0"
license: "No license available"
topics: ["Training"]
date: "2025-10-27"
last_verified: "Oct 27, 2025"
image: "https://user-images.githubusercontent.com/36110304/212753610-843a44c9-9703-4dd1-9e50-86bd2a4deba7.png"
---

# Split Workflow

A fundamental Pegasus training workflow demonstrating how to split data into parallel tasks and manage distributed execution dependencies.

## Description

The Split Workflow example illustrates how a dataset can be partitioned into multiple independent chunks and processed concurrently within a Pegasus workflow.

It demonstrates:

- Parallel execution of independent tasks  
- Data partitioning techniques  
- Aggregation of distributed results  
- Basic workflow graph construction  

This workflow is commonly used for training purposes to help new users understand how Pegasus handles job dependencies and scalable execution.

## Workflow Structure

1. Input data is partitioned into smaller segments.
2. Each segment is processed independently in parallel.
3. Results are optionally merged or aggregated.
4. Final outputs are produced after all jobs complete.

## How to Run

```bash
# Generate the workflow (if applicable)
./workflow_generator.py

# Plan and submit the workflow
pegasus-plan --conf pegasus.properties \
             --site condorpool \
             --output-sites local \
             --dir work \
             --submit workflow.yml

```
## THE WORKFLOW VISUALISATION
</script>

<script>
    const md = window.markdownit({ html: true });

    async function init() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
        }

        try {
            const rawContent = document.getElementById('source-md').textContent;
            const parts = rawContent.split('---');
            if (parts.length < 3) throw new Error("Invalid Markdown Structure.");
            
            const yaml = parts[1];
            let body = parts.slice(2).join('---');

            const meta = {};
            yaml.trim().split('\n').forEach(line => {
                const [key, ...val] = line.split(':');
                if(key && val.length > 0) meta[key.trim().toLowerCase()] = val.join(':').trim().replace(/['"]/g, '');
            });

            document.getElementById('m-ver').innerText = meta.pegasus_version || 'N/A';
            document.getElementById('m-date').innerText = meta.last_verified || 'N/A';
            
            if (meta.github_repo) {
                document.getElementById('gh-link').href = meta.github_repo;
                if (meta.github_repo.includes('github.com')) {
                    const urlParts = new URL(meta.github_repo).pathname.split('/').filter(x => x);
                    if(urlParts.length >= 2) fetchGitHubData(urlParts[0], urlParts[1]);
                }
            }

            // VIZ LOGIC: Check for SVG block first, fallback to YAML image URL
            let foundViz = false;
            const codeRegex = /```svg[\s\S]*?\n([\s\S]*?)```/g;
            let match;
            while ((match = codeRegex.exec(body)) !== null) {
                if (match[1].includes('<svg')) {
                    renderVizTerminal(match[1], 'svg'); 
                    body = body.replace(match[0], ''); 
                    foundViz = true;
                    break;
                }
            }

            // Fallback: If no SVG code block, but image exists in YAML, render that!
            if (!foundViz && meta.image) {
                renderVizTerminal(meta.image, 'img');
            }

            document.getElementById('wf-content').innerHTML = md.render(body);

        } catch (error) {
            document.getElementById('wf-content').innerHTML = `<h2>Error Loading Content</h2><p>${error.message}</p>`;
        }
    }

    // Updated render tool handles both SVGs and PNG URLs
    function renderVizTerminal(data, type) {
        const vizBox = document.getElementById('viz-box');
        const vizTarget = document.getElementById('viz-target');
        const vizTitle = document.getElementById('viz-title');
        
        vizBox.style.display = 'block'; 
        
        if (type === 'svg') {
            vizTarget.innerHTML = data;
            vizTitle.innerText = "live_dag_visualization.svg";
            
            const svgElement = vizTarget.querySelector('svg');
            if(svgElement) {
                svgElement.setAttribute('width', '100%');
                svgElement.setAttribute('height', '100%');
                
                vizTarget.querySelectorAll('.edge path').forEach(path => {
                    const bulletPath = path.cloneNode(true);
                    bulletPath.classList.add('bullet');
                    bulletPath.removeAttribute('id');
                    path.parentNode.appendChild(bulletPath);
                });
            }
        } else if (type === 'img') {
            vizTarget.innerHTML = `<img src="${data}" alt="Workflow Visualization">`;
            vizTitle.innerText = "workflow_visualisation.png";
        }
    }

    async function fetchGitHubData(owner, repo) {
        try {
            const r1 = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents`);
            if (!r1.ok) throw new Error();
            const files = await r1.json();
            
            document.getElementById('tree-box').innerHTML = files.slice(0,6).map(f => 
                `<div class="tree-node"><i class="fas ${f.type==='dir'?'fa-folder':'fa-file-code'}"></i> ${f.name}</div>`
            ).join('');

            const r2 = await fetch(`https://api.github.com/repos/${owner}/${repo}/contributors?per_page=5`);
            if (!r2.ok) throw new Error();
            const users = await r2.json();
            
            document.getElementById('contrib-stack').innerHTML = users.map(u => 
                `<img src="${u.avatar_url}" title="${u.login}" alt="${u.login}">`
            ).join('');
            
        } catch(error) { 
            document.getElementById('tree-box').innerHTML = "<span style='color:var(--text-muted);font-size:0.8rem;'>Unavailable.</span>";
            document.getElementById('contrib-stack').innerHTML = "<span style='color:var(--text-muted);font-size:0.8rem;'>Unavailable.</span>";
        }
    }

    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('.theme-toggle i');
        body.classList.toggle('light-mode');
        if(body.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            localStorage.setItem('theme', 'dark');
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    }

    window.onload = init;
</script>
</body>
</html>
